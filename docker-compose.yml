services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: retail_pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d retail_pos"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/retail_pos?schema=public
      JWT_SECRET: local-docker-change-this-secret
      JWT_EXPIRES_IN: 7d
      PORT: 4000
      CORS_ORIGIN: http://localhost
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000/api
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
